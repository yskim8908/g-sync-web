<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Sync - 공공 업무 자동화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-slate-50">
    <!-- 로딩 오버레이 -->
    <div id="progress-overlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 text-center">
            <div class="animate-spin w-12 h-12 border-4 border-slate-300 border-t-blue-600 rounded-full mx-auto mb-4"></div>
            <p id="progress-text" class="text-slate-600 font-medium">처리 중...</p>
        </div>
    </div>

    <!-- 토스트 컨테이너 -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50"></div>

    <div class="flex h-screen">
        <!-- 사이드바 -->
        <div class="w-64 bg-slate-900 text-white flex flex-col">
            <!-- 로고 -->
            <div class="p-6 border-b border-slate-700">
                <h1 class="text-2xl font-bold">🔐 G-Sync</h1>
                <p class="text-sm text-slate-400 mt-1">공공 업무 자동화</p>
            </div>

            <!-- 현재 사용자 -->
            <div class="p-4 border-b border-slate-700">
                <p id="user-name" class="font-semibold text-white"></p>
                <p id="user-email" class="text-sm text-slate-400"></p>
            </div>

            <!-- 사업 선택 -->
            <div class="p-4 border-b border-slate-700">
                <label class="block text-xs font-semibold text-slate-400 mb-2">현재 사업</label>
                <select id="project-selector" class="w-full px-3 py-2 bg-slate-800 text-white rounded border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">사업 선택...</option>
                </select>
                <p id="current-project-name" class="text-sm text-slate-400 mt-2"></p>
            </div>

            <!-- 네비게이션 -->
            <nav class="flex-1 px-4 py-6 space-y-2">
                <button class="nav-btn w-full text-left px-4 py-2 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-2" data-tab="upload">
                    <span>📤</span> 파일 업로드
                </button>
                <button class="nav-btn w-full text-left px-4 py-2 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-2" data-tab="manage">
                    <span>📝</span> 데이터 관리
                </button>
                <button class="nav-btn w-full text-left px-4 py-2 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-2" data-tab="briefing">
                    <span>🤖</span> AI 브리핑
                </button>
                <button class="nav-btn w-full text-left px-4 py-2 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-2" data-tab="forms">
                    <span>📋</span> 서식 채우기
                </button>
                <button class="nav-btn w-full text-left px-4 py-2 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-2" data-tab="download">
                    <span>📥</span> 다운로드
                </button>
            </nav>

            <!-- 로그아웃 -->
            <div class="p-4 border-t border-slate-700">
                <button id="logout-btn" class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold transition-colors">
                    로그아웃
                </button>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div class="flex-1 overflow-auto">
            <!-- 헤더 -->
            <div class="bg-white border-b border-slate-200 sticky top-0 z-10">
                <div class="px-8 py-6">
                    <h2 id="tab-title" class="text-3xl font-bold text-slate-900"></h2>
                    <p id="tab-description" class="text-slate-600 mt-1"></p>
                </div>
            </div>

            <!-- 탭 콘텐츠 -->
            <div class="p-8">
                <!-- Tab 1: 파일 업로드 -->
                <div id="tab-upload" class="tab-content hidden">
                    <div id="upload-container"></div>
                </div>

                <!-- Tab 2: 데이터 관리 -->
                <div id="tab-manage" class="tab-content hidden">
                    <div id="manage-container"></div>
                </div>

                <!-- Tab 3: AI 브리핑 -->
                <div id="tab-briefing" class="tab-content hidden">
                    <div id="briefing-container"></div>
                </div>

                <!-- Tab 4: 서식 채우기 -->
                <div id="tab-forms" class="tab-content hidden">
                    <div id="forms-container"></div>
                </div>

                <!-- Tab 5: 다운로드 -->
                <div id="tab-download" class="tab-content hidden">
                    <div id="download-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (module) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const config = {
            apiKey: '__FIREBASE_API_KEY__',
            authDomain: '__FIREBASE_AUTH_DOMAIN__',
            projectId: '__FIREBASE_PROJECT_ID__',
            storageBucket: '__FIREBASE_STORAGE_BUCKET__',
            messagingSenderId: '__FIREBASE_MESSAGING_SENDER_ID__',
            appId: '__FIREBASE_APP_ID__'
        };

        const app = initializeApp(config);
        const db = getFirestore(app);
        window._db = db;
        window._app = app;

        // 나머지 스크립트 로드
        const scripts = [
            'js/config.js',
            'js/toast.js',
            'js/state.js',
            'js/api.js',
            'js/router.js',
            'js/sidebar.js',
            'js/components/progress.js',
            'js/tabs/tab-upload.js',
            'js/tabs/tab-manage.js',
            'js/tabs/tab-briefing.js',
            'js/tabs/tab-forms.js',
            'js/tabs/tab-download.js',
            'js/app.js'
        ];

        let loaded = 0;
        scripts.forEach(src => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = () => {
                loaded++;
                if (loaded === scripts.length) {
                    window.GSync.app.init();
                }
            };
            document.head.appendChild(script);
        });
    </script>
</body>
</html>
